## ─────────────────────────────────────────────────────────────
##  Cookies Grandma — Render Infrastructure as Code
##  Defines: 1 Web Service (Node.js API) + 1 PostgreSQL Database
##  Docs: https://render.com/docs/infrastructure-as-code
## ─────────────────────────────────────────────────────────────

services:
  - type: web
    name: cookies-grandma-api
    env: node
    region: singapore          # closest to Indonesia
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node database/setup.js && node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cookies-grandma-db
          property: connectionString
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true     # Render auto-generates a secure secret
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: cookiesgrandma2025   # ⚠️ Change via Render dashboard after deploy
      - key: FRONTEND_URL
        value: https://cookies-grandma.vercel.app   # ⚠️ Update after Vercel deploy
      - key: WA_NUMBER
        value: "6281234567890"      # ⚠️ Update to your real WA number
      - key: PRICE_NASTAR
        value: "95000"
      - key: PRICE_KASTANGEL
        value: "95000"
      - key: PRICE_GIFT_WRAP
        value: "15000"
      - key: PRICE_HAMPER_BOX
        value: "35000"
      - key: MIDTRANS_IS_PRODUCTION
        value: "false"
      # Add these manually in Render dashboard (sensitive):
      # MIDTRANS_SERVER_KEY, MIDTRANS_CLIENT_KEY
      # EMAIL_HOST, EMAIL_PORT, EMAIL_USER, EMAIL_PASS, EMAIL_FROM

databases:
  - name: cookies-grandma-db
    databaseName: cookies_grandma
    user: cookies_grandma
    region: singapore
    plan: free
