<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — Cookies Grandma</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --crimson:   #8B1A1A;
  --crimson-dk:#5C0F0F;
  --crimson-lt:#B02525;
  --cream:     #F5EDD6;
  --gold:      #C9993F;
  --gold-lt:   #E4B96A;
  --brown:     #3D1F0D;
  --bg:        #F0EBE3;
  --sidebar-w: 256px;
  --white:     #FFFFFF;
  --green:     #16A34A;
  --yellow:    #D97706;
  --blue:      #2563EB;
  --red:       #DC2626;
  --border:    #E5DDD3;
  --text:      #1C1C1C;
  --text-soft: #6B6B6B;
  --font-ui:   'DM Sans', sans-serif;
  --font-disp: 'Playfair Display', serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: var(--font-ui); background: var(--bg); color: var(--text); font-size: 14px; }
a { text-decoration: none; color: inherit; }
button { border: none; cursor: pointer; font-family: inherit; }
input, select, textarea { font-family: inherit; font-size: 14px; }

/* ── LOGIN SCREEN ── */
#loginScreen {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; background: var(--crimson);
  position: fixed; inset: 0; z-index: 9999;
}
#loginScreen::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 30% 70%, rgba(201,153,63,0.2), transparent 60%);
}
.login-card {
  background: var(--white); border-radius: 16px; padding: 3rem;
  width: 100%; max-width: 400px; position: relative; z-index: 1;
  box-shadow: 0 32px 80px rgba(0,0,0,0.25);
}
.login-logo { font-family: var(--font-disp); font-size: 1.6rem; font-weight: 900; color: var(--crimson); margin-bottom: 0.25rem; }
.login-logo em { font-style: italic; }
.login-subtitle { font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-soft); margin-bottom: 2rem; }
.login-label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--text-soft); margin-bottom: 6px; }
.login-input {
  width: 100%; padding: 0.75rem 1rem; border: 1.5px solid var(--border);
  border-radius: 8px; font-size: 14px; outline: none; margin-bottom: 1rem;
  transition: border-color 0.2s;
}
.login-input:focus { border-color: var(--crimson); }
.login-btn {
  width: 100%; padding: 0.85rem; background: var(--crimson); color: white;
  border-radius: 8px; font-size: 13px; font-weight: 600; letter-spacing: 0.5px;
  transition: background 0.2s;
}
.login-btn:hover { background: var(--crimson-dk); }
.login-err { color: var(--red); font-size: 13px; margin-top: 0.5rem; display: none; }

/* ── APP SHELL ── */
#app { display: none; height: 100vh; flex-direction: row; }
#app.visible { display: flex; }

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar-w); background: var(--brown); height: 100vh;
  display: flex; flex-direction: column; flex-shrink: 0; position: fixed;
  left: 0; top: 0; z-index: 100; overflow-y: auto;
}
.sidebar-brand {
  padding: 1.5rem 1.25rem 1.25rem;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.sidebar-brand-name { font-family: var(--font-disp); font-size: 1.15rem; font-weight: 900; color: var(--cream); }
.sidebar-brand-name em { font-style: italic; color: var(--gold-lt); }
.sidebar-brand-sub { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(245,237,214,0.4); margin-top: 2px; }
.sidebar-nav { flex: 1; padding: 1rem 0; }
.nav-section-label {
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  color: rgba(245,237,214,0.35); padding: 1rem 1.25rem 0.4rem;
}
.nav-item {
  display: flex; align-items: center; gap: 0.65rem;
  padding: 0.7rem 1.25rem; color: rgba(245,237,214,0.65);
  font-size: 13px; font-weight: 400; border-radius: 0;
  transition: color 0.2s, background 0.2s; cursor: pointer;
  border-left: 2px solid transparent;
}
.nav-item:hover { color: var(--cream); background: rgba(255,255,255,0.04); }
.nav-item.active { color: var(--gold-lt); background: rgba(201,153,63,0.1); border-left-color: var(--gold); }
.nav-item .icon { font-size: 1rem; width: 20px; text-align: center; flex-shrink: 0; }
.sidebar-bottom { padding: 1rem 1.25rem; border-top: 1px solid rgba(255,255,255,0.08); }
.admin-pill {
  display: flex; align-items: center; gap: 0.6rem;
  padding: 0.6rem 0.75rem; border-radius: 8px;
  background: rgba(255,255,255,0.05);
}
.admin-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--crimson); color: white;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 13px; flex-shrink: 0;
}
.admin-name { font-size: 12px; font-weight: 500; color: var(--cream); }
.admin-role { font-size: 10px; color: rgba(245,237,214,0.4); }
.logout-btn {
  margin-left: auto; font-size: 11px; color: rgba(245,237,214,0.4);
  background: none; padding: 4px 6px; border-radius: 4px;
  transition: color 0.2s;
}
.logout-btn:hover { color: var(--gold-lt); }

/* ── MAIN ── */
.main {
  flex: 1; margin-left: var(--sidebar-w); height: 100vh;
  display: flex; flex-direction: column; overflow: hidden;
}
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1rem 2rem; background: var(--white);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.topbar-title { font-family: var(--font-disp); font-size: 1.3rem; font-weight: 700; color: var(--brown); }
.topbar-right { display: flex; align-items: center; gap: 0.75rem; }
.page-content { flex: 1; overflow-y: auto; padding: 1.75rem 2rem; }

/* ── STATS GRID ── */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.75rem; }
.stat-card {
  background: var(--white); border-radius: 10px; padding: 1.25rem 1.5rem;
  border: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 0.25rem;
}
.stat-label { font-size: 11px; font-weight: 500; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-soft); }
.stat-value { font-family: var(--font-disp); font-size: 1.75rem; font-weight: 700; color: var(--brown); }
.stat-sub { font-size: 12px; color: var(--text-soft); }
.stat-icon { font-size: 1.5rem; margin-bottom: 0.25rem; }
.stat-card.highlight { background: var(--crimson); border-color: var(--crimson); }
.stat-card.highlight .stat-label, .stat-card.highlight .stat-sub { color: rgba(245,237,214,0.7); }
.stat-card.highlight .stat-value { color: var(--gold-lt); }

/* ── GRID 2-COL ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; margin-bottom: 1.75rem; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.25rem; }

/* ── CARDS ── */
.card { background: var(--white); border-radius: 10px; border: 1px solid var(--border); overflow: hidden; }
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1rem 1.25rem; border-bottom: 1px solid var(--border);
}
.card-title { font-weight: 600; font-size: 13px; color: var(--brown); }
.card-body { padding: 1.25rem; }

/* ── CHART BAR ── */
.chart-bars { display: flex; align-items: flex-end; gap: 8px; height: 120px; padding: 0 4px; }
.chart-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
.chart-bar { width: 100%; border-radius: 4px 4px 0 0; background: var(--crimson); transition: opacity 0.2s; min-height: 4px; }
.chart-bar:hover { opacity: 0.75; }
.chart-label { font-size: 10px; color: var(--text-soft); text-align: center; }

/* ── DONUT ── */
.donut-wrap { display: flex; align-items: center; gap: 1.25rem; }
.donut { position: relative; width: 90px; height: 90px; flex-shrink: 0; }
.donut svg { transform: rotate(-90deg); }
.donut-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.donut-num { font-family: var(--font-disp); font-size: 1rem; font-weight: 700; color: var(--brown); line-height: 1; }
.donut-lbl { font-size: 9px; color: var(--text-soft); }
.legend { display: flex; flex-direction: column; gap: 8px; }
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.legend-name { font-size: 12px; color: var(--text-soft); }
.legend-val { font-size: 12px; font-weight: 600; color: var(--brown); margin-left: auto; }

/* ── TABLES ── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { padding: 0.65rem 1rem; text-align: left; font-size: 11px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-soft); background: #FAFAFA; border-bottom: 1px solid var(--border); }
td { padding: 0.85rem 1rem; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #FAFAFA; }
.td-mono { font-family: monospace; font-size: 12px; font-weight: 600; color: var(--crimson); }

/* ── STATUS BADGES ── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: 100px; font-size: 11px; font-weight: 600;
  white-space: nowrap;
}
.badge-pending    { background: #FEF3C7; color: #92400E; }
.badge-confirmed  { background: #DBEAFE; color: #1E40AF; }
.badge-processing { background: #EDE9FE; color: #5B21B6; }
.badge-shipped    { background: #D1FAE5; color: #065F46; }
.badge-delivered  { background: #D1FAE5; color: #064E3B; }
.badge-cancelled  { background: #FEE2E2; color: #991B1B; }
.badge-paid       { background: #D1FAE5; color: #065F46; }
.badge-unpaid     { background: #FEF3C7; color: #92400E; }
.badge-refunded   { background: #F3F4F6; color: #374151; }

/* ── FILTERS / TOOLBAR ── */
.toolbar { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; flex-wrap: wrap; }
.search-box {
  display: flex; align-items: center; gap: 0.5rem;
  background: var(--white); border: 1px solid var(--border); border-radius: 8px;
  padding: 0.5rem 0.75rem; flex: 1; min-width: 200px;
}
.search-box input { border: none; outline: none; width: 100%; font-size: 13px; background: transparent; }
.filter-select {
  padding: 0.5rem 0.75rem; border: 1px solid var(--border); border-radius: 8px;
  background: var(--white); font-size: 13px; outline: none; color: var(--text);
}
.btn-sm {
  padding: 0.5rem 1rem; border-radius: 8px; font-size: 12px; font-weight: 600;
  transition: all 0.15s; display: inline-flex; align-items: center; gap: 0.4rem;
}
.btn-primary { background: var(--crimson); color: white; }
.btn-primary:hover { background: var(--crimson-dk); }
.btn-secondary { background: var(--white); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--bg); }
.btn-danger { background: var(--red); color: white; }
.btn-danger:hover { background: #B91C1C; }
.btn-green { background: var(--green); color: white; }
.btn-green:hover { background: #15803D; }

/* ── PAGINATION ── */
.pagination { display: flex; align-items: center; justify-content: space-between; margin-top: 1rem; }
.pagination-info { font-size: 12px; color: var(--text-soft); }
.pagination-btns { display: flex; gap: 4px; }
.page-btn {
  width: 30px; height: 30px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--white); font-size: 12px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s;
}
.page-btn.active { background: var(--crimson); border-color: var(--crimson); color: white; }
.page-btn:hover:not(.active) { background: var(--bg); }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 500;
  display: flex; align-items: center; justify-content: center;
  padding: 1rem; backdrop-filter: blur(4px); opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--white); border-radius: 14px; padding: 2rem;
  width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto;
  box-shadow: 0 24px 80px rgba(0,0,0,0.2);
  transform: scale(0.95); transition: transform 0.25s;
}
.modal-overlay.open .modal { transform: scale(1); }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
.modal-title { font-family: var(--font-disp); font-size: 1.2rem; font-weight: 700; color: var(--brown); }
.modal-close { width: 30px; height: 30px; border-radius: 50%; background: var(--bg); font-size: 1rem; display: flex; align-items: center; justify-content: center; color: var(--text-soft); }
.modal-close:hover { background: var(--border); }
.modal-field { margin-bottom: 1rem; }
.modal-field label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-soft); margin-bottom: 5px; }
.modal-field input, .modal-field select, .modal-field textarea {
  width: 100%; padding: 0.65rem 0.85rem; border: 1.5px solid var(--border);
  border-radius: 8px; outline: none; transition: border-color 0.2s; font-size: 13px;
}
.modal-field input:focus, .modal-field select:focus, .modal-field textarea:focus { border-color: var(--crimson); }
.modal-field textarea { min-height: 80px; resize: vertical; }
.modal-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
.modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.5rem; }

/* ── ORDER DETAIL ── */
.order-detail-row { display: flex; justify-content: space-between; padding: 0.6rem 0; border-bottom: 1px solid var(--border); }
.order-detail-row:last-child { border-bottom: none; }
.order-detail-label { font-size: 12px; color: var(--text-soft); }
.order-detail-val { font-size: 13px; font-weight: 500; color: var(--text); text-align: right; max-width: 60%; }
.timeline { margin-top: 1rem; }
.timeline-item { display: flex; gap: 0.75rem; padding-bottom: 1rem; position: relative; }
.timeline-item::before { content: ''; position: absolute; left: 9px; top: 20px; bottom: 0; width: 1px; background: var(--border); }
.timeline-item:last-child::before { display: none; }
.timeline-dot { width: 20px; height: 20px; border-radius: 50%; background: var(--crimson); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.timeline-dot-inner { width: 8px; height: 8px; border-radius: 50%; background: white; }
.timeline-content { flex: 1; }
.timeline-status { font-size: 12px; font-weight: 600; color: var(--brown); text-transform: capitalize; }
.timeline-time { font-size: 11px; color: var(--text-soft); margin-top: 2px; }
.timeline-note { font-size: 11px; color: var(--text-soft); margin-top: 2px; font-style: italic; }

/* ── PRODUCT CARD ── */
.product-admin-card {
  background: var(--white); border-radius: 10px; border: 1px solid var(--border);
  overflow: hidden;
}
.product-admin-img { width: 100%; height: 200px; object-fit: cover; }
.product-admin-body { padding: 1.25rem; }
.product-admin-name { font-family: var(--font-disp); font-size: 1.1rem; font-weight: 700; color: var(--brown); }
.product-admin-sub { font-size: 12px; font-style: italic; color: var(--crimson); margin-top: 2px; }
.product-admin-price { font-family: var(--font-disp); font-size: 1.4rem; font-weight: 700; color: var(--crimson); margin-top: 0.75rem; }
.product-admin-meta { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; }
.product-admin-tag { font-size: 11px; background: var(--bg); color: var(--text-soft); padding: 3px 8px; border-radius: 100px; border: 1px solid var(--border); }
.stock-badge { font-size: 12px; font-weight: 600; }
.stock-ok   { color: var(--green); }
.stock-low  { color: var(--yellow); }
.stock-none { color: var(--red); }

/* ── SETTINGS ── */
.settings-section { margin-bottom: 2rem; }
.settings-section h3 { font-family: var(--font-disp); font-size: 1rem; font-weight: 700; color: var(--brown); margin-bottom: 1rem; }
.settings-field { display: grid; grid-template-columns: 200px 1fr; align-items: center; gap: 1rem; padding: 0.85rem 0; border-bottom: 1px solid var(--border); }
.settings-field label { font-size: 13px; font-weight: 500; color: var(--text); }
.settings-field .desc { font-size: 11px; color: var(--text-soft); margin-top: 2px; }
.settings-input { padding: 0.55rem 0.75rem; border: 1.5px solid var(--border); border-radius: 8px; outline: none; font-size: 13px; transition: border-color 0.2s; width: 100%; }
.settings-input:focus { border-color: var(--crimson); }
.toggle { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute; cursor: pointer; inset: 0;
  background: var(--border); border-radius: 100px; transition: background 0.2s;
}
.toggle-slider::before {
  content: ''; position: absolute; height: 16px; width: 16px; left: 3px; bottom: 3px;
  background: white; border-radius: 50%; transition: transform 0.2s;
}
.toggle input:checked + .toggle-slider { background: var(--green); }
.toggle input:checked + .toggle-slider::before { transform: translateX(18px); }

/* ── TOAST ── */
.toast-stack { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 1000; display: flex; flex-direction: column; gap: 0.5rem; }
.toast {
  background: var(--brown); color: var(--cream); padding: 0.75rem 1rem;
  border-radius: 8px; font-size: 13px; font-weight: 500; min-width: 220px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.2); border-left: 3px solid var(--gold);
  display: flex; align-items: center; gap: 0.5rem;
  transform: translateX(110%); transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
}
.toast.show { transform: translateX(0); }
.toast.toast-err { border-left-color: var(--red); }

/* ── LOADER ── */
.spinner {
  width: 20px; height: 20px; border: 2px solid var(--border);
  border-top-color: var(--crimson); border-radius: 50%; animation: spin 0.7s linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }
.page-loader { display: flex; align-items: center; justify-content: center; height: 200px; }

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- ─── LOGIN SCREEN ───────────────────────────────────────────────────── -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">Cookies <em>Grandma</em></div>
    <div class="login-subtitle">Admin Panel</div>
    <label class="login-label" for="loginUser">Username</label>
    <input class="login-input" type="text" id="loginUser" placeholder="admin" autocomplete="username">
    <label class="login-label" for="loginPass">Password</label>
    <input class="login-input" type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
    <div class="login-err" id="loginErr">❌ Invalid username or password.</div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">Sign In →</button>
  </div>
</div>

<!-- ─── APP ───────────────────────────────────────────────────────────── -->
<div id="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-name">Cookies <em>Grandma</em></div>
      <div class="sidebar-brand-sub">Admin Panel</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <div class="nav-item active" onclick="showPage('dashboard')" id="nav-dashboard">
        <span class="icon">📊</span> Dashboard
      </div>
      <div class="nav-item" onclick="showPage('orders')" id="nav-orders">
        <span class="icon">🛍️</span> Orders
      </div>
      <div class="nav-section-label">Catalogue</div>
      <div class="nav-item" onclick="showPage('products')" id="nav-products">
        <span class="icon">🍪</span> Products
      </div>
      <div class="nav-section-label">System</div>
      <div class="nav-item" onclick="showPage('settings')" id="nav-settings">
        <span class="icon">⚙️</span> Settings
      </div>
      <div class="nav-item" onclick="window.open('/', '_blank')">
        <span class="icon">🌐</span> View Website
      </div>
    </nav>
    <div class="sidebar-bottom">
      <div class="admin-pill">
        <div class="admin-avatar" id="adminAvatar">A</div>
        <div>
          <div class="admin-name" id="adminName">Admin</div>
          <div class="admin-role">Administrator</div>
        </div>
        <button class="logout-btn" onclick="doLogout()">↩</button>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbarTitle">Dashboard</div>
      <div class="topbar-right">
        <span style="font-size:12px;color:var(--text-soft)" id="topbarDate"></span>
      </div>
    </div>
    <div class="page-content" id="pageContent">
      <div class="page-loader"><div class="spinner"></div></div>
    </div>
  </main>
</div>

<!-- ─── MODALS ─────────────────────────────────────────────────────────── -->

<!-- ─── JAVASCRIPT ─────────────────────────────────────────────────────── -->
<script>
/* ════════════════════════════════════════════
   STATE
════════════════════════════════════════════ */
let token       = localStorage.getItem('cg_token') || '';
let currentPage = 'dashboard';
let orderPage   = 1;
let orderFilter = 'all';
let orderSearch = '';
let editingOrderId  = null;
let editingProductId = null;
let statsCache  = null;

const API = '/api';

/* ════════════════════════════════════════════
   FETCH HELPER
════════════════════════════════════════════ */
async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: {
      'Content-Type': 'application/json',
      ...(token ? { Authorization: 'Bearer ' + token } : {})
    },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  const data = await res.json();
  if (res.status === 401) { doLogout(); return null; }
  return data;
}

/* ════════════════════════════════════════════
   AUTH
════════════════════════════════════════════ */
async function doLogin() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;
  const btn  = document.getElementById('loginBtn');
  const err  = document.getElementById('loginErr');
  if (!user || !pass) return;
  btn.textContent = 'Signing in...'; btn.disabled = true;
  const data = await api('/auth/login', { method: 'POST', body: { username: user, password: pass } });
  btn.textContent = 'Sign In →'; btn.disabled = false;
  if (!data || !data.success) { err.style.display = 'block'; return; }
  err.style.display = 'none';
  token = data.token;
  localStorage.setItem('cg_token', token);
  initApp(data.admin);
}

document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function doLogout() {
  token = '';
  localStorage.removeItem('cg_token');
  document.getElementById('app').classList.remove('visible');
  document.getElementById('loginScreen').style.display = 'flex';
}

async function initApp(admin) {
  // If we have a saved token, verify it
  if (!admin && token) {
    const me = await api('/auth/me');
    if (!me || !me.success) { doLogout(); return; }
    admin = me.admin;
  }
  if (!admin) return;

  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  document.getElementById('adminName').textContent = admin.full_name || admin.username;
  document.getElementById('adminAvatar').textContent = (admin.full_name || admin.username).charAt(0).toUpperCase();
  document.getElementById('topbarDate').textContent = new Date().toLocaleDateString('id-ID', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  showPage('dashboard');
}

/* ════════════════════════════════════════════
   ROUTING
════════════════════════════════════════════ */
function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + page);
  if (navEl) navEl.classList.add('active');

  const titles = { dashboard:'Dashboard', orders:'Orders', products:'Products', settings:'Settings' };
  document.getElementById('topbarTitle').textContent = titles[page] || page;

  const c = document.getElementById('pageContent');
  c.innerHTML = '<div class="page-loader"><div class="spinner"></div></div>';

  if (page === 'dashboard') renderDashboard();
  if (page === 'orders')    renderOrders();
  if (page === 'products')  renderProducts();
  if (page === 'settings')  renderSettings();
}

/* ════════════════════════════════════════════
   DASHBOARD
════════════════════════════════════════════ */
async function renderDashboard() {
  const data = await api('/orders/admin/stats');
  if (!data) return;
  const s = data.stats;
  const monthly = data.monthly_data || [];
  const recent  = data.recent_orders || [];

  const maxRev = Math.max(...monthly.map(m => m.revenue), 1);

  // Donut chart data
  const total = (s.nastar_sold || 0) + (s.kastangel_sold || 0) || 1;
  const nPct  = ((s.nastar_sold / total) * 100).toFixed(0);
  const kPct  = ((s.kastangel_sold / total) * 100).toFixed(0);
  const r = 38, circ = 2 * Math.PI * r;
  const nDash = (s.nastar_sold / total) * circ;
  const kDash = (s.kastangel_sold / total) * circ;

  document.getElementById('pageContent').innerHTML = `
    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-card highlight">
        <div class="stat-icon">💰</div>
        <div class="stat-label">Total Revenue</div>
        <div class="stat-value">${fmtRp(s.revenue_total)}</div>
        <div class="stat-sub">From paid orders</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🛍️</div>
        <div class="stat-label">Total Orders</div>
        <div class="stat-value">${s.total_orders}</div>
        <div class="stat-sub">${s.orders_today} today</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⏳</div>
        <div class="stat-label">Pending Orders</div>
        <div class="stat-value" style="color:${s.pending_orders > 0 ? 'var(--yellow)' : 'var(--green)'}">${s.pending_orders}</div>
        <div class="stat-sub">Need attention</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🍪</div>
        <div class="stat-label">Jars Sold</div>
        <div class="stat-value">${s.nastar_sold + s.kastangel_sold}</div>
        <div class="stat-sub">Nastar + Kastangel</div>
      </div>
    </div>

    <div class="grid-2">
      <!-- Monthly Revenue Chart -->
      <div class="card">
        <div class="card-header"><div class="card-title">📈 Monthly Revenue (Last 6 Months)</div></div>
        <div class="card-body">
          <div class="chart-bars">
            ${monthly.length === 0 ? '<div style="color:var(--text-soft);font-size:12px;margin:auto">No data yet</div>' :
              monthly.map(m => {
                const h = Math.max(8, Math.round((m.revenue / maxRev) * 110));
                const label = m.month ? m.month.slice(5) : '';
                return `<div class="chart-bar-wrap">
                  <div style="font-size:10px;color:var(--text-soft);text-align:center">${fmtRpShort(m.revenue)}</div>
                  <div class="chart-bar" style="height:${h}px" title="${m.month}: ${fmtRp(m.revenue)}"></div>
                  <div class="chart-label">${label}</div>
                </div>`;
              }).join('')}
          </div>
        </div>
      </div>

      <!-- Product Split -->
      <div class="card">
        <div class="card-header"><div class="card-title">🍪 Product Sales Split</div></div>
        <div class="card-body">
          <div class="donut-wrap">
            <div class="donut">
              <svg width="90" height="90" viewBox="0 0 90 90">
                <circle cx="45" cy="45" r="${r}" fill="none" stroke="#EAD9B8" stroke-width="14"/>
                <circle cx="45" cy="45" r="${r}" fill="none" stroke="var(--crimson)" stroke-width="14"
                  stroke-dasharray="${nDash} ${circ - nDash}" stroke-linecap="round"/>
                <circle cx="45" cy="45" r="${r}" fill="none" stroke="var(--gold)" stroke-width="14"
                  stroke-dasharray="${kDash} ${circ - kDash}"
                  stroke-dashoffset="${-nDash}" stroke-linecap="round"/>
              </svg>
              <div class="donut-center">
                <div class="donut-num">${total}</div>
                <div class="donut-lbl">jars</div>
              </div>
            </div>
            <div class="legend">
              <div class="legend-item">
                <div class="legend-dot" style="background:var(--crimson)"></div>
                <span class="legend-name">Nastar</span>
                <span class="legend-val">${s.nastar_sold} (${nPct}%)</span>
              </div>
              <div class="legend-item">
                <div class="legend-dot" style="background:var(--gold)"></div>
                <span class="legend-name">Kastangel</span>
                <span class="legend-val">${s.kastangel_sold} (${kPct}%)</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Recent Orders -->
    <div class="card" style="margin-top:1.25rem">
      <div class="card-header">
        <div class="card-title">🕐 Recent Orders</div>
        <button class="btn-sm btn-secondary" onclick="showPage('orders')">View All →</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Order #</th><th>Customer</th><th>Total</th><th>Status</th><th>Payment</th><th>Date</th><th></th>
          </tr></thead>
          <tbody>
          ${recent.length === 0 ? '<tr><td colspan="7" style="text-align:center;color:var(--text-soft);padding:2rem">No orders yet.</td></tr>' :
            recent.map(o => `<tr>
              <td class="td-mono">${o.order_number}</td>
              <td>${o.customer_name}</td>
              <td style="font-weight:600">${fmtRp(o.total_price)}</td>
              <td><span class="badge badge-${o.status}">${cap(o.status)}</span></td>
              <td><span class="badge badge-${o.payment_status}">${cap(o.payment_status)}</span></td>
              <td style="color:var(--text-soft)">${fmtDate(o.created_at)}</td>
              <td><button class="btn-sm btn-secondary" onclick="openOrderDetail(${o.id})">View</button></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;

/* ════════════════════════════════════════════
   ORDERS
════════════════════════════════════════════ */
async function renderOrders() {

  document.getElementById('pageContent').innerHTML = `
    <div class="toolbar">
      <div class="search-box">
        <span>🔍</span>

      </div>
      <select class="filter-select" onchange="orderFilter=this.value;orderPage=1;renderOrders()">
        ${statusOptions.map(s => `<option value="${s}" ${s===orderFilter?'selected':''}>${s==='all'?'All Status':cap(s)}</option>`).join('')}

      <button class="btn-sm btn-secondary" onclick="renderOrders()">🔄 Refresh</button>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">Orders (${data.total})</div>

          <thead><tr>

          ${data.orders.length === 0
            ? '<tr><td colspan="10" style="text-align:center;color:var(--text-soft);padding:2rem">No orders found.</td></tr>'
            : data.orders.map(o => `<tr>
              <td class="td-mono">${o.order_number}</td>
              <td style="font-weight:500">${o.customer_name}</td>
              <td>
                <a href="https://wa.me/${o.customer_phone.replace(/\D/g,'')}" target="_blank"
                  style="color:var(--green);font-weight:500">${o.customer_phone}</a>
              </td>
              <td style="font-size:12px">
                ${o.nastar_qty > 0 ? `<div>🍡 Nastar ×${o.nastar_qty}</div>` : ''}
                ${o.kastangel_qty > 0 ? `<div>🧀 Kastangel ×${o.kastangel_qty}</div>` : ''}
              </td>
              <td style="font-weight:700;color:var(--crimson)">${fmtRp(o.total_price)}</td>
              <td style="font-size:11px">${giftLabel(o.gift_wrapping)}</td>
              <td><span class="badge badge-${o.status}">${cap(o.status)}</span></td>
              <td><span class="badge badge-${o.payment_status}">${cap(o.payment_status)}</span></td>
              <td style="font-size:11px;color:var(--text-soft)">${fmtDate(o.created_at)}</td>
              <td>
                <div style="display:flex;gap:4px">
                  <button class="btn-sm btn-secondary" onclick="openOrderDetail(${o.id})" title="View">👁</button>
                  <button class="btn-sm btn-primary" onclick="openStatusModal(${o.id},'${o.status}','${o.payment_status}')" title="Update">✏️</button>
                  <button class="btn-sm" style="background:#FEE2E2;color:var(--red)" onclick="deleteOrder(${o.id})" title="Delete">🗑</button>
                </div>
              </td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
      <div style="padding:0.75rem 1.25rem;border-top:1px solid var(--border)">
        <div class="pagination">
          <div class="pagination-info">
            Showing ${((orderPage-1)*15)+1}–${Math.min(orderPage*15, data.total)} of ${data.total} orders
          </div>
          <div class="pagination-btns">
            ${orderPage > 1 ? `<button class="page-btn" onclick="orderPage=${orderPage-1};renderOrders()">←</button>` : ''}
            ${Array.from({length: data.pages}, (_,i) => `
              <button class="page-btn ${i+1===orderPage?'active':''}" onclick="orderPage=${i+1};renderOrders()">${i+1}</button>
            `).join('')}
            ${orderPage < data.pages ? `<button class="page-btn" onclick="orderPage=${orderPage+1};renderOrders()">→</button>` : ''}
          </div>
        </div>
      </div>
    </div>
  `;
}

async function openOrderDetail(id) {
  editingOrderId = id;
  openModal('orderModal');
  document.getElementById('orderModalBody').innerHTML = '<div class="page-loader"><div class="spinner"></div></div>';
  const data = await api('/orders/admin/' + id);
  if (!data || !data.success) return;
  const o = data.order;
  const logs = data.logs || [];

  document.getElementById('orderModalTitle').textContent = 'Order ' + o.order_number;
  document.getElementById('orderModalBody').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.25rem">
      <div><div style="font-size:11px;color:var(--text-soft);margin-bottom:4px">STATUS</div>
        <span class="badge badge-${o.status}" style="font-size:12px">${cap(o.status)}</span></div>
      <div><div style="font-size:11px;color:var(--text-soft);margin-bottom:4px">PAYMENT</div>
        <span class="badge badge-${o.payment_status}" style="font-size:12px">${cap(o.payment_status)}</span></div>
    </div>

    <div style="font-weight:600;font-size:12px;letter-spacing:0.5px;text-transform:uppercase;color:var(--text-soft);margin-bottom:0.5rem">Customer</div>
    <div class="order-detail-row"><span class="order-detail-label">Name</span><span class="order-detail-val">${o.customer_name}</span></div>
    <div class="order-detail-row"><span class="order-detail-label">Phone</span>
      <span class="order-detail-val"><a href="https://wa.me/${(o.customer_phone||'').replace(/\D/g,'')}" target="_blank" style="color:var(--green)">${o.customer_phone}</a></span></div>
    ${o.customer_email ? `<div class="order-detail-row"><span class="order-detail-label">Email</span><span class="order-detail-val">${o.customer_email}</span></div>` : ''}
    <div class="order-detail-row"><span class="order-detail-label">Address</span><span class="order-detail-val">${o.address}${o.city?', '+o.city:''}${o.postal_code?' '+o.postal_code:''}</span></div>

    <div style="font-weight:600;font-size:12px;letter-spacing:0.5px;text-transform:uppercase;color:var(--text-soft);margin:1rem 0 0.5rem">Order Items</div>
    ${o.nastar_qty > 0 ? `<div class="order-detail-row"><span class="order-detail-label">🍡 Premium Nastar ×${o.nastar_qty}</span><span class="order-detail-val">${fmtRp(o.nastar_qty*95000)}</span></div>` : ''}
    ${o.kastangel_qty > 0 ? `<div class="order-detail-row"><span class="order-detail-label">🧀 Premium Kastangel ×${o.kastangel_qty}</span><span class="order-detail-val">${fmtRp(o.kastangel_qty*95000)}</span></div>` : ''}
    ${o.gift_wrapping !== 'none' ? `<div class="order-detail-row"><span class="order-detail-label">🎁 ${giftLabel(o.gift_wrapping)}</span><span class="order-detail-val">${fmtRp(o.gift_wrapping==='gift_wrap'?15000:35000)}</span></div>` : ''}
    <div class="order-detail-row" style="font-weight:700"><span class="order-detail-label" style="font-size:14px;font-weight:700;color:var(--brown)">Total</span><span class="order-detail-val" style="font-size:18px;color:var(--crimson)">${fmtRp(o.total_price)}</span></div>

    ${o.notes ? `<div style="margin-top:0.75rem;padding:0.75rem;background:var(--bg);border-radius:6px;font-size:12px;color:var(--text-soft);font-style:italic">📝 ${o.notes}</div>` : ''}

    <div style="font-weight:600;font-size:12px;letter-spacing:0.5px;text-transform:uppercase;color:var(--text-soft);margin:1rem 0 0.5rem">Order Timeline</div>
    <div class="timeline">
      ${logs.map(l => `<div class="timeline-item">
        <div class="timeline-dot"><div class="timeline-dot-inner"></div></div>
        <div class="timeline-content">
          <div class="timeline-status">${cap(l.status)}</div>
          <div class="timeline-time">${fmtDate(l.created_at)}</div>
          ${l.note ? `<div class="timeline-note">${l.note}</div>` : ''}
        </div>
      </div>`).join('')}
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1.5rem;flex-wrap:wrap">
      <button class="btn-sm btn-primary" onclick="closeModal('orderModal');openStatusModal(${o.id},'${o.status}','${o.payment_status}')">✏️ Update Status</button>
      <a class="btn-sm btn-green" href="https://wa.me/${(o.customer_phone||'').replace(/\D/g,'')}?text=${waOrderMsg(o)}" target="_blank">💬 WhatsApp Customer</a>
      <button class="btn-sm" style="background:#FEE2E2;color:var(--red)" onclick="closeModal('orderModal');deleteOrder(${o.id})">🗑 Delete</button>
    </div>
  `;
}

function openStatusModal(id, status, payStatus) {
  editingOrderId = id;
  document.getElementById('statusSelect').value        = status;
  document.getElementById('paymentStatusSelect').value = payStatus;
  document.getElementById('statusNote').value          = '';
  openModal('statusModal');
}

async function saveStatus() {
  const status         = document.getElementById('statusSelect').value;
  const payment_status = document.getElementById('paymentStatusSelect').value;
  const note           = document.getElementById('statusNote').value;
  const data = await api('/orders/admin/' + editingOrderId + '/status', {
    method: 'PATCH', body: { status, payment_status, note }
  });
  if (!data?.success) { toast('Error saving status', true); return; }
  toast('✅ Order updated!');
  closeModal('statusModal');
  if (currentPage === 'orders') renderOrders();
  if (currentPage === 'dashboard') renderDashboard();
}

async function deleteOrder(id) {
  if (!confirm('Delete this order? This cannot be undone.')) return;
  const data = await api('/orders/admin/' + id, { method: 'DELETE' });
  if (!data?.success) { toast('Error deleting order', true); return; }
  toast('Order deleted.');
  if (currentPage === 'orders') renderOrders();
  if (currentPage === 'dashboard') renderDashboard();
}

            </p>
            <div style="margin-top:1rem;display:flex;gap:0.5rem">
              <button class="btn-sm btn-primary" onclick="openProductEdit(${p.id})">✏️ Edit</button>
            </div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

async function openProductEdit(id) {
  editingProductId = id;
  openModal('productModal');
  document.getElementById('productModalBody').innerHTML = '<div class="page-loader"><div class="spinner"></div></div>';
  const data = await api('/products/' + (id === 1 ? 'nastar' : 'kastangel'));
  if (!data?.success) return;
  const p = data.product;
  document.getElementById('productModalTitle').textContent = 'Edit: ' + p.name;
  document.getElementById('productModalBody').innerHTML = `
    <div class="modal-field"><label>Product Name</label>
      <input class="settings-input" id="pe_name" value="${p.name}"></div>
    <div class="modal-field"><label>Subtitle</label>
      <input class="settings-input" id="pe_subtitle" value="${p.subtitle || ''}"></div>
    <div class="modal-field"><label>Description</label>
      <textarea class="settings-input" id="pe_desc" rows="4">${p.description || ''}</textarea></div>
    <div class="modal-2col">
      <div class="modal-field"><label>Price (IDR)</label>
        <input class="settings-input" type="number" id="pe_price" value="${p.price}"></div>
      <div class="modal-field"><label>Stock (jars)</label>
        <input class="settings-input" type="number" id="pe_stock" value="${p.stock}"></div>
    </div>
    <div class="modal-field" style="display:flex;align-items:center;gap:0.75rem">
      <label class="toggle" style="margin:0">
        <input type="checkbox" id="pe_active" ${p.is_active ? 'checked' : ''}>
        <span class="toggle-slider"></span>
      </label>
      <span style="font-size:13px;color:var(--text)">Product is Active (visible on website)</span>
    </div>
    <div class="modal-actions">
      <button class="btn-sm btn-secondary" onclick="closeModal('productModal')">Cancel</button>
      <button class="btn-sm btn-primary" onclick="saveProduct()">Save Changes</button>
    </div>
  `;
}

async function saveProduct() {
  const body = {
    name:        document.getElementById('pe_name').value,
    subtitle:    document.getElementById('pe_subtitle').value,
    description: document.getElementById('pe_desc').value,
    price:       parseInt(document.getElementById('pe_price').value),
    stock:       parseInt(document.getElementById('pe_stock').value),
    is_active:   document.getElementById('pe_active').checked,
  };
  const data = await api('/products/admin/' + editingProductId, { method: 'PATCH', body });
  if (!data?.success) { toast('Error saving product', true); return; }
  toast('✅ Product updated!');
  closeModal('productModal');
  renderProducts();
}

/* ════════════════════════════════════════════
   SETTINGS
════════════════════════════════════════════ */
async function renderSettings() {
  const data = await api('/products/admin/settings/all');
  const s = data?.settings || {};

  document.getElementById('pageContent').innerHTML = `
    <div style="max-width:700px">

      <div class="card" style="margin-bottom:1.5rem">
        <div class="card-header"><div class="card-title">🏪 Store Settings</div></div>
        <div class="card-body">
          <div class="settings-field">
            <div><div class="settings-label">Store Name</div></div>
            <input class="settings-input" id="set_site_name" value="${s.site_name || 'Cookies Grandma'}">
          </div>
          <div class="settings-field">
            <div><div class="settings-label">WhatsApp Number</div>
              <div class="desc">Without + prefix (e.g. 6281234567890)</div></div>
            <input class="settings-input" id="set_wa_number" value="${s.wa_number || ''}">
          </div>
          <div class="settings-field">
            <div><div class="settings-label">Default Shipping Cost (IDR)</div>
              <div class="desc">Set 0 for free shipping</div></div>
            <input class="settings-input" type="number" id="set_shipping" value="${s.shipping_cost_default || 0}">
          </div>
        </div>
      </div>

      <div class="card" style="margin-bottom:1.5rem">
        <div class="card-header"><div class="card-title">💰 Pricing Add-ons</div></div>
        <div class="card-body">
          <div class="settings-field">
            <div><div class="settings-label">Gift Wrapping Price (IDR)</div></div>
            <input class="settings-input" type="number" id="set_gift_wrap" value="${s.price_gift_wrap || 15000}">
          </div>
          <div class="settings-field">
            <div><div class="settings-label">Hamper Box Price (IDR)</div></div>
            <input class="settings-input" type="number" id="set_hamper" value="${s.price_hamper_box || 35000}">
          </div>
        </div>
      </div>

      <div class="card" style="margin-bottom:1.5rem">
        <div class="card-header"><div class="card-title">📧 Email Notifications</div></div>
        <div class="card-body">
          <div class="settings-field">
            <div><div class="settings-label">Enable Email Notifications</div>
              <div class="desc">Send email to admin on new orders</div></div>
            <label class="toggle">
              <input type="checkbox" id="set_email_notif" ${s.email_notifications === 'true' ? 'checked' : ''}>
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="settings-field">
            <div><div class="settings-label">Notification Email</div>
              <div class="desc">Admin email to receive order alerts</div></div>
            <input class="settings-input" type="email" id="set_notif_email" value="${s.order_notification_email || ''}">
          </div>
        </div>
      </div>

      <div class="card" style="margin-bottom:1.5rem">
        <div class="card-header"><div class="card-title">🔒 Change Password</div></div>
        <div class="card-body">
          <div class="settings-field">
            <div><div class="settings-label">Current Password</div></div>
            <input class="settings-input" type="password" id="set_curr_pass" placeholder="••••••••">
          </div>
          <div class="settings-field">
            <div><div class="settings-label">New Password</div>
              <div class="desc">Minimum 8 characters</div></div>
            <input class="settings-input" type="password" id="set_new_pass" placeholder="••••••••">
          </div>
          <div style="margin-top:1rem">
            <button class="btn-sm btn-primary" onclick="savePassword()">Change Password</button>
          </div>
        </div>
      </div>

      <button class="btn-sm btn-primary" style="padding:0.75rem 2rem;font-size:13px" onclick="saveSettings()">
        💾 Save All Settings
      </button>
    </div>
  `;
}

async function saveSettings() {
  const updates = {
    site_name:               document.getElementById('set_site_name').value,
    wa_number:               document.getElementById('set_wa_number').value,
    shipping_cost_default:   document.getElementById('set_shipping').value,
    price_gift_wrap:         document.getElementById('set_gift_wrap').value,
    price_hamper_box:        document.getElementById('set_hamper').value,
    email_notifications:     document.getElementById('set_email_notif').checked ? 'true' : 'false',
    order_notification_email:document.getElementById('set_notif_email').value,
  };
  const data = await api('/products/admin/settings/update', { method: 'PATCH', body: updates });
  if (!data?.success) { toast('Error saving settings', true); return; }
  toast('✅ Settings saved!');
}

async function savePassword() {
  const curr = document.getElementById('set_curr_pass').value;
  const next  = document.getElementById('set_new_pass').value;
  if (!curr || !next) { toast('Please fill both password fields', true); return; }
  const data = await api('/auth/change-password', { method: 'POST', body: { current_password: curr, new_password: next } });
  if (!data?.success) { toast(data?.message || 'Error changing password', true); return; }
  toast('✅ Password changed!');
  document.getElementById('set_curr_pass').value = '';
  document.getElementById('set_new_pass').value  = '';
}

/* ════════════════════════════════════════════
   UTILS
════════════════════════════════════════════ */
function fmtRp(n) { return 'Rp ' + parseInt(n || 0).toLocaleString('id-ID'); }
function fmtRpShort(n) {
  n = parseInt(n || 0);
  if (n >= 1000000) return 'Rp ' + (n/1000000).toFixed(1) + 'jt';
  if (n >= 1000)    return 'Rp ' + (n/1000).toFixed(0) + 'rb';
  return 'Rp ' + n;
}
function cap(s)    { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d + (d.includes('Z') ? '' : 'Z')).toLocaleString('id-ID', {
    day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'
  });
}
function giftLabel(g) {
  if (g === 'gift_wrap') return '🎀 Gift Wrap';
  if (g === 'hamper')    return '🎁 Hamper';
  return '—';
}
function waOrderMsg(o) {
  return encodeURIComponent(`Halo ${o.customer_name}! 🍪\nTerima kasih telah memesan di Cookies Grandma.\nOrder Anda *${o.order_number}* sedang kami proses.\nTotal: *Rp ${parseInt(o.total_price).toLocaleString('id-ID')}*\n\nAda yang bisa kami bantu? 😊`);
}

function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

function toast(msg, isErr = false) {
  const t = document.createElement('div');
  t.className = 'toast' + (isErr ? ' toast-err' : '');
  t.textContent = msg;
  document.getElementById('toastStack').appendChild(t);
  requestAnimationFrame(() => { requestAnimationFrame(() => t.classList.add('show')); });
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 400); }, 3000);
}
